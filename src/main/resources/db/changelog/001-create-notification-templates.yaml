databaseChangeLog:
  - changeSet:
      id: 001-create-notification-templates
      author: platform-team
      changes:
        - createTable:
            tableName: notification_templates
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: channel
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: subject
                  type: varchar(998)
              - column:
                  name: body_template
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: variables
                  type: jsonb
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)
              - column:
                  name: deleted_at
                  type: timestamp with time zone
              - column:
                  name: deleted_by
                  type: varchar(255)
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: notification_templates
            columnNames: tenant_id, name
            constraintName: uq_template_tenant_name
        - createIndex:
            tableName: notification_templates
            indexName: idx_template_tenant_id
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: notification_templates
            indexName: idx_template_channel
            columns:
              - column:
                  name: channel
