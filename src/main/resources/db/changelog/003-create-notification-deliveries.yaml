databaseChangeLog:
  - changeSet:
      id: 003-create-notification-deliveries
      author: platform-team
      changes:
        - createTable:
            tableName: notification_deliveries
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: channel
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: recipient_address
                  type: varchar(1024)
              - column:
                  name: template_id
                  type: uuid
              - column:
                  name: webhook_subscription_id
                  type: uuid
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
              - column:
                  name: error_detail
                  type: text
              - column:
                  name: attempts
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: last_attempted_at
                  type: timestamp with time zone
              - column:
                  name: delivered_at
                  type: timestamp with time zone
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)
              - column:
                  name: idempotency_key
                  type: varchar(255)
              - column:
                  name: metadata
                  type: jsonb
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: notification_deliveries
            baseColumnNames: template_id
            referencedTableName: notification_templates
            referencedColumnNames: id
            constraintName: fk_delivery_template
        - addForeignKeyConstraint:
            baseTableName: notification_deliveries
            baseColumnNames: webhook_subscription_id
            referencedTableName: webhook_subscriptions
            referencedColumnNames: id
            constraintName: fk_delivery_webhook_sub
        - addUniqueConstraint:
            tableName: notification_deliveries
            columnNames: tenant_id, idempotency_key
            constraintName: uq_delivery_tenant_idempotency
        - createIndex:
            tableName: notification_deliveries
            indexName: idx_delivery_tenant_id
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: notification_deliveries
            indexName: idx_delivery_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: notification_deliveries
            indexName: idx_delivery_channel
            columns:
              - column:
                  name: channel
        - createIndex:
            tableName: notification_deliveries
            indexName: idx_delivery_created_at
            columns:
              - column:
                  name: created_at
        - createIndex:
            tableName: notification_deliveries
            indexName: idx_delivery_recipient
            columns:
              - column:
                  name: recipient_address
