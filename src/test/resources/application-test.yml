api:
  auth:
    enabled: false
  cache:
    enabled: false
  rate-limit:
    enabled: false
  idempotency:
    enabled: false
  audit:
    enabled: false
  events:
    enabled: true
    default-channel: notification-events
    require-transaction: false
  response:
    include-request-id: true
    include-timestamp: true
  versioning:
    current-version: v1
    minimum-version: v1
  pagination:
    default-page-size: 20
    max-page-size: 100
  feature-flags:
    store: none

spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  liquibase:
    enabled: false
  cloud:
    azure:
      active-directory:
        enabled: false

notification:
  feature:
    bulk-send-enabled: false
    dry-run-mode: false
  email:
    sender-address: noreply@test.example.com
  webhook:
    connect-timeout-ms: 1000
    read-timeout-ms: 2000
    max-retries: 3

messaging:
  servicebus:
    connection-string: ""
    queue-name: notification-delivery-test
