name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Authenticate to Google Artifact Registry
        run: |
          echo '${{ secrets.GCR_SVC_ACCT }}' > /tmp/gcloud-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud-key.json" >> "$GITHUB_ENV"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set Maven version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -B -ntp

      - name: Build and verify
        run: mvn clean verify -B -ntp

      - name: Deploy to Artifact Registry
        run: mvn deploy -B -ntp -DskipTests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/notification-service-*.jar
