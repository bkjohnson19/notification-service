name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: notifications_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Authenticate to Google Artifact Registry
        run: |
          echo '${{ secrets.GCR_SVC_ACCT }}' > /tmp/gcloud-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud-key.json" >> "$GITHUB_ENV"

      - name: Build and verify
        run: mvn clean verify -B -ntp
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/notifications_test
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_password

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: 'target/site/jacoco/'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: 'target/surefire-reports/'

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Lint Helm chart
        run: helm lint helm/notification-service/

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Authenticate to Google Artifact Registry
        run: |
          echo '${{ secrets.GCR_SVC_ACCT }}' > /tmp/gcloud-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud-key.json" >> "$GITHUB_ENV"

      - name: Build JAR
        run: mvn package -B -ntp -DskipTests

      - name: Build Docker image
        run: docker build -t notification-service:${{ github.sha }} .
