name: Dependency Updates

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Authenticate to Google Artifact Registry
        run: |
          echo '${{ secrets.GCR_SVC_ACCT }}' > /tmp/gcloud-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud-key.json" >> "$GITHUB_ENV"

      - name: Check dependency updates
        run: mvn versions:display-dependency-updates -B -ntp

      - name: Check plugin updates
        run: mvn versions:display-plugin-updates -B -ntp

      - name: Check property updates
        run: mvn versions:display-property-updates -B -ntp
